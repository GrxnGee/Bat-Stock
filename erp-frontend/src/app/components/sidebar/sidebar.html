<nav class="sidebar" [class.collapsed]="isCollapsed">

  <div class="sidebar-header">
    <div class="brand">
      <h2>🏪 <span *ngIf="!isCollapsed">My Store</span></h2>
    </div>

    <button class="toggle-btn" (click)="toggleSidebar()">
      <span *ngIf="!isCollapsed">«</span>
      <span *ngIf="isCollapsed">»</span>
    </button>
  </div>

  <ul class="nav-links" style="flex: 1; overflow-y: auto;">
    @for (item of menuItems; track item.title) {
      @if (hasAccess(item.roles)) {
        <li>
          <a [routerLink]="item.route" routerLinkActive="active" [title]="isCollapsed ? item.title : ''">
            <span class="icon">{{ item.icon }}</span>
            <span class="text" *ngIf="!isCollapsed">{{ item.title }}</span>
          </a>
        </li>
      }
    }
  </ul>

  <div class="sidebar-footer" [class.collapsed]="isCollapsed">
    <div class="user-info" *ngIf="!isCollapsed">
       <span class="user-name">👤 {{ authService.getUserName() }}</span>
    </div>
    <button class="btn-logout" (click)="onLogout()" [title]="isCollapsed ? 'ออกจากระบบ' : ''">
       <span class="icon">🚪</span>
       <span class="text" *ngIf="!isCollapsed">ออกจากระบบ</span>
    </button>
 </div>

</nav>

<app-alert-modal 
  [isOpen]="isAlertOpen" 
  [type]="alertType" 
  [message]="alertMessage" 
  (confirmed)="confirmLogout()" 
  (closed)="isAlertOpen = false">
</app-alert-modal>
